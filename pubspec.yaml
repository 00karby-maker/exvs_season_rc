name: exvs_season_rc
description: A Flutter app for match records.

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  hive: ^2.2.3
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.6
  hive_generator: ^2.0.1

  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/icon.png

# 👇 ここがアイコン設定
flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"

  # ↓ Android用（任意・推奨）
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icon.png"